# prek.toml — Git hook configuration for homelab-cluster
#
# Installation:
#   uv add --dev prek
#   uv run prek install

minimum_prek_version = "0.3.0"

default_install_hook_types = ["pre-commit", "commit-msg"]
default_stages = ["pre-commit"]


[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace", priority = 0 },
  { id = "end-of-file-fixer", priority = 0 },
  { id = "check-yaml", args = ["--allow-multiple-documents"], priority = 0 },
  { id = "check-json", priority = 0 },
  { id = "check-toml", priority = 0 },
  { id = "check-merge-conflict", priority = 0 },
  { id = "check-case-conflict", priority = 0 },
  { id = "check-symlinks", priority = 0 },
  { id = "detect-private-key", priority = 0 },
  { id = "mixed-line-ending", priority = 0 },
]


[[repos]]
repo = "https://github.com/gitleaks/gitleaks"
rev = "v8.24.3"
hooks = [
  { id = "gitleaks", priority = 0 },
]


[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v5.0.0"
hooks = [
  { id = "check-added-large-files", args = ["--maxkb=500"], priority = 0, exclude = "^.*/docs/images/.*$" },
  { id = "check-added-large-files", args = ["--maxkb=3072"], priority = 0, files = "^.*/docs/images/.*$" },
]


[[repos]]
repo = "https://github.com/compilerla/conventional-pre-commit"
rev = "v4.1.0"
hooks = [
  { id = "conventional-pre-commit", stages = ["commit-msg"], args = [
    "feat", "fix", "refactor", "docs", "test", "ci", "chore", "build", "perf",
  ] },
]


# Offline K8s manifest schema validation. Catches API/field typos without a live
# cluster — the cluster API is the only thing `kubectl --dry-run` can lean on
# for schema, so it's useless when the cluster is unreachable. Scoped to the
# manifest paths to avoid scanning Helm values / Ansible vars.
[[repos]]
repo = "local"
hooks = [
  { id = "kubeconform",
    name = "Validate K8s manifests with kubeconform",
    entry = "kubeconform -strict -summary -ignore-missing-schemas",
    language = "system",
    files = "^(apps|storage|network/private|network/public)/.*\\.ya?ml$",
    exclude = "^.*/(values|kustomization)\\.ya?ml$",
    priority = 0,
  },
]
