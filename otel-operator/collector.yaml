# OpenTelemetryCollector custom resource + RBAC for the homelab telemetry pipeline.
#
# Purpose: Define a single Deployment-mode Collector that scrapes
#     Prometheus-style metrics (currently only dcgm-exporter), enriches every
#     data point with Kubernetes resource attributes (k8s.pod.name,
#     k8s.namespace.name, k8s.node.name, …) via the k8sattributes processor,
#     and exports to Better Stack via OTLP HTTP.
# Scope: Cluster-level metrics pipeline. Pod-log collection is intentionally
#     out of scope here — that needs a DaemonSet Collector with the filelog
#     receiver and is planned as a follow-up.
# Overview: The Operator installed via helmfile reconciles this CR into a
#     Deployment + Service + ConfigMap. Authentication to Better Stack uses
#     a SOURCE_TOKEN injected from a Kubernetes Secret (created by the
#     helmfile presync hook from the BETTERSTACK_SANDBOX_INGEST_TOKEN env
#     variable in .env).
# Dependencies: opentelemetry-operator (deployed by helmfile), gpu-operator
#     (provides nvidia-dcgm-exporter Service in the gpu-operator namespace),
#     Secret `betterstack-sandbox-ingest-token` in the opentelemetry namespace.
# Related: helmfile.yaml.gotmpl (release: opentelemetry-operator),
#     gpu-operator/values.yaml (dcgm-exporter Service).

---
# ServiceAccount the Collector runs as. The Operator wires this in
# automatically when serviceAccount: is set on the CR below.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: opentelemetry

---
# RBAC for the k8sattributes processor (read pod/node/namespace/replicaset
# metadata) AND for Prometheus pod-discovery (list pods cluster-wide,
# filter to dcgm-exporter via relabel_configs).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets", "daemonsets", "deployments", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
  # Required for scraping kubelet (/metrics) and cAdvisor (/metrics/cadvisor)
  # via kubernetes_sd_configs role=node. The Prometheus receiver hits
  # https://<node-ip>:10250/metrics{,/cadvisor} which the apiserver authorizes
  # via these subresources.
  - apiGroups: [""]
    resources: ["nodes/metrics", "nodes/proxy", "nodes/stats"]
    verbs: ["get"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: opentelemetry

---
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: gateway
  namespace: opentelemetry
spec:
  mode: deployment
  replicas: 1
  serviceAccount: otel-collector
  # Inject the Better Stack source token from a Secret the helmfile presync
  # hook creates. The Collector reads it as ${env:BETTERSTACK_SOURCE_TOKEN}
  # in the exporters section below.
  envFrom:
    - secretRef:
        name: betterstack-sandbox-ingest-token
  config:
    receivers:
      # Scrape NVIDIA DCGM exporter via Kubernetes pod discovery so that each
      # scrape target is the pod IP — k8sattributes can then resolve it back
      # to the owning Pod and stamp k8s.* resource attributes.
      prometheus:
        config:
          scrape_configs:
            # GPU metrics — DCGM_FI_DEV_GPU_UTIL, _FB_USED, _GPU_TEMP, _POWER_USAGE, …
            - job_name: nvidia-dcgm-exporter
              scrape_interval: 30s
              kubernetes_sd_configs:
                - role: pod
                  namespaces:
                    names: [gpu-operator]
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_label_app]
                  regex: nvidia-dcgm-exporter
                  action: keep
                - source_labels: [__meta_kubernetes_pod_container_port_number]
                  regex: "9400"
                  action: keep

            # Node-level metrics from kubelet itself (kubelet_volume_*, kubelet_running_pods,
            # machine_cpu_cores, machine_memory_bytes, runtime_operations_total, …).
            # k3s self-signed kubelet cert → insecure_skip_verify=true. Auth uses the
            # Collector pod's auto-mounted ServiceAccount token.
            - job_name: kubelet
              scrape_interval: 30s
              scheme: https
              tls_config:
                ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                insecure_skip_verify: true
              authorization:
                credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              kubernetes_sd_configs:
                - role: node
              relabel_configs:
                - action: labelmap
                  regex: __meta_kubernetes_node_label_(.+)
                - target_label: __address__
                  replacement: kubernetes.default.svc:443
                - source_labels: [__meta_kubernetes_node_name]
                  regex: (.+)
                  target_label: __metrics_path__
                  replacement: /api/v1/nodes/$1/proxy/metrics
                # Inject the node name as a first-class series label so downstream
                # queries can GROUP BY node. Without this, all 4 nodes' kubelet
                # series share an identical (job, instance, address) tuple and
                # downstream dashboards collapse to one node's value.
                - source_labels: [__meta_kubernetes_node_name]
                  target_label: node
                - source_labels: [__meta_kubernetes_node_name]
                  target_label: instance

            # Container metrics via kubelet's embedded cAdvisor — container_cpu_usage_seconds_total,
            # container_memory_working_set_bytes, container_network_receive_bytes_total, … with
            # pod/namespace/container labels for grouping.
            - job_name: cadvisor
              scrape_interval: 30s
              scheme: https
              tls_config:
                ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                insecure_skip_verify: true
              authorization:
                credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              kubernetes_sd_configs:
                - role: node
              relabel_configs:
                - action: labelmap
                  regex: __meta_kubernetes_node_label_(.+)
                - target_label: __address__
                  replacement: kubernetes.default.svc:443
                - source_labels: [__meta_kubernetes_node_name]
                  regex: (.+)
                  target_label: __metrics_path__
                  replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor
                # See kubelet job — same reason: stamp node + instance with the
                # actual node name so per-node grouping works downstream.
                - source_labels: [__meta_kubernetes_node_name]
                  target_label: node
                - source_labels: [__meta_kubernetes_node_name]
                  target_label: instance

            # kube-state-metrics — pod phase (Running/Pending/Failed), restart counts,
            # node Ready conditions, deployment availability. Canonical "cluster health"
            # source. Deployed as its own helmfile release; service exposes :8080.
            - job_name: kube-state-metrics
              scrape_interval: 30s
              kubernetes_sd_configs:
                - role: pod
                  namespaces:
                    names: [kube-state-metrics]
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
                  regex: kube-state-metrics
                  action: keep
                - source_labels: [__meta_kubernetes_pod_container_port_number]
                  regex: "8080"
                  action: keep

    processors:
      # Promote Prometheus-style labels emitted by the various exporters
      # (cAdvisor, kube-state-metrics, DCGM, kubelet) to the canonical OTel
      # k8s.* resource attribute names. Without this:
      #   - Dashboards have to query the raw labels (pod, namespace, node, …)
      #     which differ slightly per exporter (DCGM uses Hostname/container,
      #     cAdvisor uses pod/container, k-s-m uses pod/namespace, …).
      #   - The k8s_attributes processor below can't do its lookup, since it
      #     keys on k8s.pod.name to fetch deployment/replicaset/labels.
      # We copy attributes only if the source exists; existing k8s.* values
      # are preserved.
      transform/prometheus_to_k8s_attrs:
        metric_statements:
          - context: datapoint
            statements:
              - set(attributes["k8s.pod.name"], attributes["pod"]) where attributes["pod"] != nil and attributes["k8s.pod.name"] == nil
              - set(attributes["k8s.namespace.name"], attributes["namespace"]) where attributes["namespace"] != nil and attributes["k8s.namespace.name"] == nil
              - set(attributes["k8s.container.name"], attributes["container"]) where attributes["container"] != nil and attributes["k8s.container.name"] == nil
              - set(attributes["k8s.node.name"], attributes["node"]) where attributes["node"] != nil and attributes["k8s.node.name"] == nil
              # DCGM exporter uses "Hostname" instead of "node" — handle both.
              - set(attributes["k8s.node.name"], attributes["Hostname"]) where attributes["Hostname"] != nil and attributes["k8s.node.name"] == nil

      # Now k8s_attributes can resolve k8s.pod.name → owning workload metadata
      # (deployment/daemonset/statefulset, labels). The connection-based
      # association we had before was a no-op for Prometheus scrapes because
      # the "connection" is the Collector's own outbound socket, not the
      # workload pod's IP. Resource-attribute association is the right pattern.
      k8s_attributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.node.name
            - k8s.deployment.name
            - k8s.daemonset.name
            - k8s.statefulset.name
            - k8s.replicaset.name
            - k8s.container.name
          labels:
            - tag_name: k8s.pod.label.app
              key: app
              from: pod
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.name
              - from: resource_attribute
                name: k8s.namespace.name
      batch:
        timeout: 10s
        send_batch_size: 1000

    exporters:
      otlp_http/betterstack:
        endpoint: https://s2518436.us-east-9.betterstackdata.com
        compression: gzip
        headers:
          Authorization: "Bearer ${env:BETTERSTACK_SOURCE_TOKEN}"

    service:
      pipelines:
        metrics:
          receivers: [prometheus]
          # transform first (copies Prometheus labels → k8s.* attrs), then
          # k8s_attributes can enrich with workload metadata, then batch.
          processors: [transform/prometheus_to_k8s_attrs, k8s_attributes, batch]
          exporters: [otlp_http/betterstack]
      telemetry:
        logs:
          level: info
