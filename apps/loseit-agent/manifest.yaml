# loseit-agent — slice S4 (real pydantic-ai agent w/ a single `search` tool).
#
# Topology (see ARCHITECTURE.md for the full picture):
#   user → traefik-private (Tailscale only) → Ingress → Service → Deployment(server.py)
#   Deployment → Ollama (qwen3:8b) + subprocess(loseit CLI) → loseit.com
#
# Secrets:
#   - harbor-creds: docker-registry pull secret, created by deploy.sh.
#   - agent-token: opaque secret with key `token` (32 random hex bytes),
#                  created by deploy.sh on first deploy and NOT rotated on
#                  subsequent deploys (would invalidate Pipe config from S3).
#                  Mounted as the AGENT_TOKEN_EXPECTED env var so the server
#                  rejects requests without a matching bearer.
#   - loseit-token: opaque secret with key `token` (the operator's Lose It! JWT).
#                  Created out-of-band by the orchestrator (in S4 spec this
#                  later moves to Kitaru's secret store; for now it's a plain
#                  K8s Secret). Mounted as $LOSEIT_TOKEN; server.py materializes
#                  it to /home/agent/.config/loseit/token at startup.
#
# Volumes:
#   - /home/agent is an emptyDir so the agent can chmod-write its loseit
#     token file even with readOnlyRootFilesystem: true.
#
# The Namespace is intentionally apply-able via this manifest too so that the
# whole app is described in one place. deploy.sh still pre-creates the ns
# because the Harbor pull secret has to land before the Deployment pulls.
---
apiVersion: v1
kind: Namespace
metadata:
  name: loseit-agent
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loseit-agent
  namespace: loseit-agent
  labels:
    app: loseit-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loseit-agent
  template:
    metadata:
      labels:
        app: loseit-agent
    spec:
      imagePullSecrets:
        - name: harbor-creds
      containers:
        - name: agent
          image: cr.priv.mlops-club.org/loseit-agent/agent:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: AGENT_TOKEN_EXPECTED
              valueFrom:
                secretKeyRef:
                  name: agent-token
                  key: token
            - name: LOSEIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: loseit-token
                  key: token
            # The lose-it CLI also needs user identity to call the API. These
            # come from the same Secret (orchestrator-populated). They're
            # optional here so the deployment keeps rolling out even if the
            # orchestrator hasn't yet added them — the agent still boots and
            # the startup code logs a clear warning.
            - name: LOSEIT_USER_ID
              valueFrom:
                secretKeyRef:
                  name: loseit-token
                  key: user_id
                  optional: true
            - name: LOSEIT_USER_NAME
              valueFrom:
                secretKeyRef:
                  name: loseit-token
                  key: user_name
                  optional: true
            - name: LOSEIT_HOURS_FROM_GMT
              valueFrom:
                secretKeyRef:
                  name: loseit-token
                  key: hours_from_gmt
                  optional: true
            - name: OLLAMA_BASE_URL
              value: "http://ollama.ollama.svc.cluster.local:11434/v1"
            - name: OLLAMA_MODEL
              value: "qwen3:8b"
          volumeMounts:
            - name: home
              mountPath: /home/agent
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: home
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: loseit-agent
  namespace: loseit-agent
  labels:
    app: loseit-agent
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8000
  selector:
    app: loseit-agent
---
# Private Tailscale-only Ingress. Mirrors apps/ollama/manifest.yaml shape:
# traefik-private class, websecure entrypoint, wildcard TLS from the
# reflector-replicated priv-wildcard-tls secret (auto-copied into every ns).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: loseit-agent
  namespace: loseit-agent
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik-private
  tls:
    - hosts:
        - loseit-agent.priv.mlops-club.org
      secretName: priv-wildcard-tls
  rules:
    - host: loseit-agent.priv.mlops-club.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: loseit-agent
                port:
                  number: 80
