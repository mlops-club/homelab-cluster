apiVersion: v1
kind: Namespace
metadata:
  name: jellyfin
---
# Static PV — videos library on NAS at a human-readable path
apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-videos
spec:
  capacity:
    storage: 500Gi
  accessModes: [ReadWriteMany]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  csi:
    driver: nfs.csi.k8s.io
    volumeHandle: jellyfin-videos
    volumeAttributes:
      server: "100.117.142.58"
      share: "/volume1/k8s-homelab/media/videos"
  mountOptions: [nfsvers=3, nolock]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: videos
  namespace: jellyfin
spec:
  accessModes: [ReadWriteMany]
  storageClassName: ""
  volumeName: jellyfin-videos
  resources:
    requests:
      storage: 500Gi
---
# Config — Jellyfin database, plugins, settings (node-local via local-path)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: config
  namespace: jellyfin
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
# Cache — transcoding cache and image cache (node-local via local-path)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cache
  namespace: jellyfin
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: jellyfin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      securityContext:
        # GID 44 = video, GID 109 = render on most Linux distros
        # Grants access to /dev/dri devices for hardware transcoding
        supplementalGroups: [44, 109]
      containers:
      - name: jellyfin
        image: jellyfin/jellyfin:10.11.8
        ports:
        - containerPort: 8096
          name: http
        env:
        - name: TZ
          value: America/Denver
        volumeMounts:
        - name: config
          mountPath: /config
        - name: cache
          mountPath: /cache
        - name: videos
          mountPath: /media
        # To enable Intel QSV/VAAPI hardware transcoding, uncomment and ensure
        # GPU drivers are loaded on the node (i915 module + /dev/dri present):
        # - name: dri
        #   mountPath: /dev/dri
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: config
      - name: cache
        persistentVolumeClaim:
          claimName: cache
      - name: videos
        persistentVolumeClaim:
          claimName: videos
      # Uncomment for hardware transcoding (requires i915 GPU driver on node):
      # - name: dri
      #   hostPath:
      #     path: /dev/dri
---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin
  namespace: jellyfin
spec:
  type: NodePort
  selector:
    app: jellyfin
  ports:
  - port: 8096
    targetPort: 8096
    nodePort: 30096
    name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jellyfin
  namespace: jellyfin
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik-private
  tls:
  - hosts:
    - jellyfin.priv.mlops-club.org
    secretName: priv-wildcard-tls
  rules:
  - host: jellyfin.priv.mlops-club.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: jellyfin
            port:
              number: 8096
