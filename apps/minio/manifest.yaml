# MinIO — single-replica S3-compatible object store, NFS-backed.
#
# Why this exists:
#   The Kitaru UI refused to load execution logs from our previous local
#   artifact store with: "Files in a local artifact store cannot be accessed
#   from the server.". ZenML hardcodes the "remote" check by URI prefix
#   (s3://, gs://, az://, abfs://, hdfs://) — see
#   zenml/utils/io_utils.py::is_remote — so making the local-path PVC bigger
#   or NFS-backed does NOT bypass it. We need a real object store that the
#   Kitaru server, the loseit-agent, and any future client can all read/write
#   from over HTTP. MinIO is the canonical, self-hosted, S3-compatible fit.
#
# Topology:
#   loseit-agent ──s3 PUT──┐
#                          ├──► minio.minio.svc.cluster.local:9000
#   kitaru-server ─s3 GET──┘                        │
#                                                   ▼
#                                       ┌─────────────────────┐
#                                       │ NFS PV (nas-nfs)    │
#                                       │ /volume1/k8s-homelab│
#                                       │   /pvc-<id>/        │
#                                       │     └─ data/        │
#                                       │         └─ kitaru-  │
#                                       │            artifacts│
#                                       └─────────────────────┘
#
# Single replica is fine — single-user homelab; we trade HA for simplicity
# and avoid distributed-mode quirks. The data still survives node loss
# because it lives on the NAS over NFS.
#
# NOT publicly exposed: ClusterIP Service only, no Ingress, no Cloudflare
# Tunnel. The bucket holds Kitaru artifacts (logs, intermediate JSON, the
# Lose It! token-rich custom_artifacts/* blobs), which should never leave
# the Tailnet.
#
# Credentials live in a Secret in this namespace; deploy.sh seeds the bucket
# `kitaru-artifacts` on first install via a one-shot mc Job.

apiVersion: v1
kind: Namespace
metadata:
  name: minio

---
# Root credentials. deploy.sh generates the values on first apply and stores
# them in this Secret; subsequent re-runs preserve the existing values.
# Mirrored into the kitaru namespace as `minio-creds` by deploy.sh too, so
# the operator's `kitaru` CLI can register the S3 artifact store with the
# same key/secret. ZenML reads access/secret keys from the artifact-store
# config (or a referenced ZenML secret); MinIO server reads them from these
# env vars.
apiVersion: v1
kind: Secret
metadata:
  name: minio-root
  namespace: minio
type: Opaque
stringData:
  # deploy.sh refuses to overwrite an existing Secret, so these placeholders
  # are only used on a brand-new namespace. Real values get generated by
  # deploy.sh on first install — see apps/minio/deploy.sh.
  rootUser: "PLACEHOLDER_REPLACE_ON_FIRST_DEPLOY"
  rootPassword: "PLACEHOLDER_REPLACE_ON_FIRST_DEPLOY"

---
# NFS-backed PVC — single object store on the NAS.
# Pattern matches apps/audiobookshelf/manifest.yaml (static PV + matching
# PVC with empty storageClassName) so the data lives under a human-readable
# subdir of /volume1/k8s-homelab instead of a dynamically-named pvc-<uuid>.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: minio-data
spec:
  capacity:
    storage: 100Gi
  accessModes: [ReadWriteOnce]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  csi:
    driver: nfs.csi.k8s.io
    volumeHandle: minio-data
    volumeAttributes:
      server: "100.117.142.58"
      # Pre-created subdir on the NAS (DirectoryOrCreate semantics don't
      # apply to NFS CSI; if this doesn't exist deploy.sh's first apply will
      # fail with a mount error — `mkdir` on the NAS once and re-run).
      share: "/volume1/k8s-homelab/minio-data"
  mountOptions: [nfsvers=3, nolock]

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data
  namespace: minio
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: ""
  volumeName: minio-data
  resources:
    requests:
      storage: 100Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: minio
  labels:
    app: minio
spec:
  # Single replica — we don't need MinIO's distributed mode for a homelab
  # artifact store; the NFS PV gives us the durability.
  replicas: 1
  strategy:
    type: Recreate  # PVC is RWO; can't run two pods at once during rollout.
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      securityContext:
        # Pin to UID 1000 (minio user inside the image) and apply fsGroup so
        # the NAS dir gets chown'd at mount. Requires the NAS NFS export to
        # have no_root_squash (already configured cluster-wide — see
        # storage/README.md "Squash rules" section).
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: minio
          image: quay.io/minio/minio:RELEASE.2024-12-18T13-15-44Z
          imagePullPolicy: IfNotPresent
          args:
            - server
            - /data
            - --address
            - ":9000"
            - --console-address
            - ":9001"
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-root
                  key: rootUser
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-root
                  key: rootPassword
            # Don't auto-update; we pin the image tag explicitly.
            - name: MINIO_UPDATE
              value: "off"
            # Force path-style addressing for compatibility with s3fs/boto3
            # default behavior (virtual-hosted-style needs DNS per-bucket
            # which we don't set up).
            - name: MINIO_DOMAIN
              value: minio.minio.svc.cluster.local
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: data

---
# Internal-only S3 API + console.
# NO Ingress. NO Cloudflare Tunnel. Cluster-internal access only at
# minio.minio.svc.cluster.local:9000. If an operator needs to poke at the
# console UI, port-forward: `kubectl -n minio port-forward svc/minio 9001:9001`.
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: minio
  labels:
    app: minio
spec:
  type: ClusterIP
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: api
    - name: console
      port: 9001
      targetPort: console
