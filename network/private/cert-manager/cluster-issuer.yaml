# ClusterIssuer for Let's Encrypt with Cloudflare DNS-01 challenge
# Applied via: envsubst < cluster-issuer.yaml | kubectl apply -f -
# Requires env vars: ACME_EMAIL, CLOUDFLARE_DOMAIN
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-cloudflare
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ${ACME_EMAIL}
    privateKeySecretRef:
      name: letsencrypt-cloudflare
    solvers:
    - dns01:
        cloudflare:
          apiTokenSecretRef:
            name: cloudflare-api-token
            key: api-token
      selector:
        dnsZones:
        - ${CLOUDFLARE_DOMAIN}
